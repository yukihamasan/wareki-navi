<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和暦変換アプリ</title>
    <style>
        :root {
            --abashiri-blue: #007bbb; /* オホーツクブルー */
            --ice-white: #f0f8ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--ice-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 4px solid var(--abashiri-blue);
        }
        h1 {
            color: var(--abashiri-blue);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        /* 【修正】アイコンエリアのスタイル */
        .icon-area {
            margin-bottom: 1rem;
        }
        /* 【追加】ニポネ画像のスタイル */
        .nipone-img {
            width: 100px; /* 画像の横幅（適宜調整してください） */
            height: auto;  /* 縦横比を維持 */
        }
        input[type="number"] {
            width: 80%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus {
            border-color: var(--abashiri-blue);
        }
        .result-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            min-height: 80px;
        }
        .era-name {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            display: block;
        }
        .footer-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-area">
        <img src="nipone.png" alt="ニポネ" class="nipone-img">
    </div>
    
    <h1>和暦変換アプリ</h1>
    
    <p>西暦（4ケタ）を入力してください</p>
    <input type="number" id="yearInput" placeholder="例: 2026" oninput="convertEra()">

    <div class="result-box">
        <span id="eraResult" class="era-name">---</span>
    </div>

    <p class="footer-text">網走での事務作業をスムーズに！</p>
</div>

<script>
    function convertEra() {
        const year = document.getElementById('yearInput').value;
        const result = document.getElementById('eraResult');

        if (!year || year < 1868) {
            result.textContent = "---";
            return;
        }

        let era = "";
        let eraYear = 0;

        if (year >= 2019) {
            era = "令和";
            eraYear = year - 2019 + 1;
        } else if (year >= 1989) {
            era = "平成";
            eraYear = year - 1989 + 1;
        } else if (year >= 1926) {
            era = "昭和";
            eraYear = year - 1926 + 1;
        } else if (year >= 1912) {
            era = "大正";
            eraYear = year - 1912 + 1;
        } else if (year >= 1868) {
            era = "明治";
            eraYear = year - 1868 + 1;
        }

        const displayYear = eraYear === 1 ? "元" : eraYear;
        result.textContent = era + displayYear + "年";
    }
</script>

</body>
</html>
